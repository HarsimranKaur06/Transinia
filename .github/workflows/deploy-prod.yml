name: Deploy prod

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  # AWS Settings
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  
  # Environment
  ENVIRONMENT: prod
  APP_NAME: transinia
  
  # ALB DNS Name from GitHub Secrets
  ALB_DNS_NAME: ${{ secrets.PROD_ALB_DNS_NAME }}
  
  # Infrastructure Names
  NAME_PREFIX: transinia-prod
  BACKEND_ECR_REPO: transinia-prod-backend
  FRONTEND_ECR_REPO: transinia-prod-frontend
  CLUSTER_NAME: transinia-prod-cluster
  BACKEND_SERVICE: transinia-prod-backend-service
  FRONTEND_SERVICE: transinia-prod-frontend-service
  
  # Resource Names
  S3_BUCKET_RAW: ${{ secrets.PROD_S3_BUCKET_RAW }}
  S3_BUCKET_PROCESSED: ${{ secrets.PROD_S3_BUCKET_PROCESSED }}
  DYNAMODB_TABLE_MEETINGS: ${{ secrets.PROD_DYNAMODB_TABLE_MEETINGS }}
  DYNAMODB_TABLE_ACTIONS: ${{ secrets.PROD_DYNAMODB_TABLE_ACTIONS }}
  
  # Monitoring
  SENTRY_DSN: ${{ secrets.PROD_SENTRY_DSN }}
  GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0

      - name: Check if S3 buckets exist
        id: check-s3
        run: |
          if aws s3api head-bucket --bucket ${{ env.S3_BUCKET_RAW }} 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy S3 Infrastructure
        if: steps.check-s3.outputs.exists != 'true'
        working-directory: backend/infra/s3-bucket-infra
        run: |
          terraform init
          terraform workspace select prod || terraform workspace new prod
          terraform apply -var-file="prod.tfvars" -auto-approve

      - name: Check if DynamoDB tables exist
        id: check-dynamodb
        run: |
          if aws dynamodb describe-table --table-name ${{ env.DYNAMODB_TABLE_MEETINGS }} 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy DynamoDB Infrastructure
        if: steps.check-dynamodb.outputs.exists != 'true'
        working-directory: backend/infra/dynamodb-infra
        run: |
          terraform init
          terraform workspace select prod || terraform workspace new prod
          terraform apply -var-file="prod.tfvars" -auto-approve

      - name: Ensure ECR repositories exist
        run: |
          aws ecr describe-repositories --repository-names $BACKEND_ECR_REPO >/dev/null 2>&1 || aws ecr create-repository --repository-name $BACKEND_ECR_REPO
          aws ecr describe-repositories --repository-names $FRONTEND_ECR_REPO >/dev/null 2>&1 || aws ecr create-repository --repository-name $FRONTEND_ECR_REPO

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: 'true'

      - name: Build and push backend image
        id: build-backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_ECR_REPO }}:latest,${{ env.ECR_REGISTRY }}/${{ env.BACKEND_ECR_REPO }}:${{ github.sha }}

      - name: Create CloudWatch Log Groups
        run: |
          aws logs create-log-group --log-group-name "/ecs/transinia-prod-backend" --region ${{ env.AWS_REGION }} || true
          aws logs create-log-group --log-group-name "/ecs/transinia-prod-frontend" --region ${{ env.AWS_REGION }} || true
          aws logs create-log-group --log-group-name "/ecs/transinia-prod-grafana" --region ${{ env.AWS_REGION }} || true

      - name: Prepare backend task definition
        run: |
          sed -i 's#\${AWS_REGION}#${{ env.AWS_REGION }}#g' .github/ecs/taskdef-backend-prod.json
          sed -i 's#\${ECS_EXECUTION_ROLE_ARN}#arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/transinia-prod-ecsTaskExecutionRole#g' .github/ecs/taskdef-backend-prod.json
          sed -i 's#\${ECS_TASK_ROLE_ARN}#arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/transinia-prod-ecsTaskRole#g' .github/ecs/taskdef-backend-prod.json
          sed -i 's#\${DYNAMODB_TABLE_MEETINGS}#${{ env.DYNAMODB_TABLE_MEETINGS }}#g' .github/ecs/taskdef-backend-prod.json
          sed -i 's#\${DYNAMODB_TABLE_ACTIONS}#${{ env.DYNAMODB_TABLE_ACTIONS }}#g' .github/ecs/taskdef-backend-prod.json
          sed -i 's#\${AWS_ACCESS_KEY_ID}#${{ secrets.AWS_ACCESS_KEY_ID }}#g' .github/ecs/taskdef-backend-prod.json
          sed -i 's#\${AWS_SECRET_ACCESS_KEY}#${{ secrets.AWS_SECRET_ACCESS_KEY }}#g' .github/ecs/taskdef-backend-prod.json
          sed -i 's#\${OPENAI_API_KEY}#${{ secrets.OPENAI_API_KEY }}#g' .github/ecs/taskdef-backend-prod.json
          sed -i 's#\${S3_BUCKET_RAW}#${{ env.S3_BUCKET_RAW }}#g' .github/ecs/taskdef-backend-prod.json
          sed -i 's#\${S3_BUCKET_PROCESSED}#${{ env.S3_BUCKET_PROCESSED }}#g' .github/ecs/taskdef-backend-prod.json
          sed -i 's#\${ENVIRONMENT}#${{ env.ENVIRONMENT }}#g' .github/ecs/taskdef-backend-prod.json
          sed -i 's#\${SENTRY_DSN}#${{ env.SENTRY_DSN }}#g' .github/ecs/taskdef-backend-prod.json

      - name: Render backend task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .github/ecs/taskdef-backend-prod.json
          container-name: meeting-bot
          image: ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_ECR_REPO }}:latest

      - name: Deploy backend service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.CLUSTER_NAME }}
          wait-for-service-stability: true

      - name: Set BACKEND_API_URL from ALB
        run: |
          echo "BACKEND_API_URL=http://${{ env.ALB_DNS_NAME }}" >> "$GITHUB_ENV"
          echo "Using BACKEND_API_URL=http://${{ env.ALB_DNS_NAME }}"

      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_ECR_REPO }}:latest,${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_ECR_REPO }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=http://${{ env.ALB_DNS_NAME }}
            NEXT_PUBLIC_API_URL=http://${{ env.ALB_DNS_NAME }}
            NEXT_PUBLIC_ENVIRONMENT=${{ env.ENVIRONMENT }}

      - name: Prepare frontend task definition
        run: |
          sed -i 's#\${AWS_REGION}#${{ env.AWS_REGION }}#g' .github/ecs/taskdef-frontend-prod.json
          sed -i 's#\${ECS_EXECUTION_ROLE_ARN}#arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/transinia-prod-ecsTaskExecutionRole#g' .github/ecs/taskdef-frontend-prod.json
          sed -i 's#\${ECS_TASK_ROLE_ARN}#arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/transinia-prod-ecsTaskRole#g' .github/ecs/taskdef-frontend-prod.json
          sed -i 's#\${BACKEND_API_URL}#${{ env.BACKEND_API_URL }}#g' .github/ecs/taskdef-frontend-prod.json
          sed -i 's#\${ALB_DNS_NAME}#${{ env.ALB_DNS_NAME }}#g' .github/ecs/taskdef-frontend-prod.json

      - name: Render frontend task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .github/ecs/taskdef-frontend-prod.json
          container-name: frontend
          image: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_ECR_REPO }}:latest
        env:
          ALB_DNS_NAME: ${{ env.ALB_DNS_NAME }}

      - name: Deploy frontend service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ env.FRONTEND_SERVICE }}
          cluster: ${{ env.CLUSTER_NAME }}
          wait-for-service-stability: true

      - name: Force service update for new tasks
        run: |
          echo "Forcing ECS service update to pick up latest tasks..."
          aws ecs update-service --cluster $CLUSTER_NAME --service $BACKEND_SERVICE --force-new-deployment
          aws ecs update-service --cluster $CLUSTER_NAME --service $FRONTEND_SERVICE --force-new-deployment

      - name: Wait for services to stabilize
        run: |
          echo "Waiting for frontend service stabilization..."
          aws ecs wait services-stable --cluster $CLUSTER_NAME --services $FRONTEND_SERVICE
          echo "Frontend stable."
          echo "Waiting for backend service stabilization..."
          aws ecs wait services-stable --cluster $CLUSTER_NAME --services $BACKEND_SERVICE
          echo "Backend stable."

      - name: Check and cleanup partial Grafana infrastructure
        id: check-grafana
        run: |
          # Check if Grafana resources exist
          SERVICE_EXISTS=false
          LOG_GROUP_EXISTS=false
          EFS_EXISTS=false
          
          # Check ECS service
          if aws ecs describe-services --cluster transinia-prod-cluster --services transinia-prod-grafana-service --query "services[0].status" --output text 2>/dev/null | grep -q "ACTIVE"; then
            SERVICE_EXISTS=true
          fi
          
          # Check CloudWatch log group
          if aws logs describe-log-groups --log-group-name-prefix "/ecs/transinia-prod-grafana" --query "logGroups[0].logGroupName" --output text 2>/dev/null | grep -q "/ecs/transinia-prod-grafana"; then
            LOG_GROUP_EXISTS=true
          fi
          
          # Check EFS file system
          EFS_ID=$(aws efs describe-file-systems --query "FileSystems[?CreationToken=='transinia-prod-grafana-efs'].FileSystemId" --output text 2>/dev/null)
          if [ ! -z "$EFS_ID" ]; then
            EFS_EXISTS=true
          fi
          
          # Count how many resources exist
          COUNT=0
          [ "$SERVICE_EXISTS" = true ] && COUNT=$((COUNT+1))
          [ "$LOG_GROUP_EXISTS" = true ] && COUNT=$((COUNT+1))
          [ "$EFS_EXISTS" = true ] && COUNT=$((COUNT+1))
          
          echo "📊 Grafana infrastructure status:"
          echo "   Service: $SERVICE_EXISTS | Log Group: $LOG_GROUP_EXISTS | EFS: $EFS_EXISTS"
          
          # If all 3 exist, skip deployment
          if [ $COUNT -eq 3 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Complete Grafana infrastructure exists - skipping deployment"
          # If partial deployment (1 or 2 exist), clean up and redeploy
          elif [ $COUNT -gt 0 ]; then
            echo "⚠️  Partial Grafana deployment detected ($COUNT/3 resources)"
            echo "🧹 Cleaning up partial resources..."
            
            # Delete log group if exists
            if [ "$LOG_GROUP_EXISTS" = true ]; then
              echo "   Deleting log group..."
              aws logs delete-log-group --log-group-name "/ecs/transinia-prod-grafana" || true
            fi
            
            # Delete EFS if exists (must delete mount targets first)
            if [ "$EFS_EXISTS" = true ]; then
              echo "   Deleting EFS mount targets..."
              for MT in $(aws efs describe-mount-targets --file-system-id $EFS_ID --query "MountTargets[].MountTargetId" --output text); do
                aws efs delete-mount-target --mount-target-id $MT || true
              done
              echo "   Waiting for mount targets to delete..."
              sleep 30
              echo "   Deleting EFS file system..."
              aws efs delete-file-system --file-system-id $EFS_ID || true
            fi
            
            # Stop/delete service if exists
            if [ "$SERVICE_EXISTS" = true ]; then
              echo "   Stopping Grafana service..."
              aws ecs update-service --cluster transinia-prod-cluster --service transinia-prod-grafana-service --desired-count 0 || true
              sleep 10
              aws ecs delete-service --cluster transinia-prod-cluster --service transinia-prod-grafana-service --force || true
            fi
            
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Cleanup complete - will deploy fresh Grafana infrastructure"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ No Grafana infrastructure found - will deploy"
          fi

      - name: Deploy Grafana Infrastructure
        if: steps.check-grafana.outputs.exists != 'true'
        working-directory: backend/infra/grafana-infra
        run: |
          terraform init
          terraform workspace select prod || terraform workspace new prod
          terraform apply -var-file="prod.tfvars" \
            -var="grafana_admin_password=${{ env.GRAFANA_ADMIN_PASSWORD }}" \
            -auto-approve

      - name: Final cleanup (log groups + verify)
        if: always()
        run: |
          aws logs create-log-group --log-group-name "/ecs/transinia-prod-backend" --region ${{ env.AWS_REGION }} || true
          aws logs create-log-group --log-group-name "/ecs/transinia-prod-frontend" --region ${{ env.AWS_REGION }} || true
          aws logs create-log-group --log-group-name "/ecs/transinia-prod-grafana" --region ${{ env.AWS_REGION }} || true
          echo "Deployment complete"

  cleanup-on-failure:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: failure()
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0

      - name: Destroy Grafana Infrastructure
        working-directory: backend/infra/grafana-infra
        run: |
          terraform init
          terraform workspace select prod || true
          terraform destroy -var-file="prod.tfvars" \
            -var="grafana_admin_password=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            -auto-approve || echo "Grafana destroy failed or already destroyed"

      - name: Destroy DynamoDB Infrastructure
        working-directory: backend/infra/dynamodb-infra
        run: |
          terraform init
          terraform workspace select prod || true
          terraform destroy -var-file="prod.tfvars" -auto-approve || echo "DynamoDB destroy failed or already destroyed"

      - name: Destroy S3 Infrastructure
        working-directory: backend/infra/s3-bucket-infra
        run: |
          terraform init
          terraform workspace select prod || true
          terraform destroy -var-file="prod.tfvars" -auto-approve || echo "S3 destroy failed or already destroyed"

      - name: Delete ECR Images
        run: |
          aws ecr batch-delete-image \
            --repository-name transinia-prod-backend \
            --image-ids imageTag=latest imageTag=${{ github.sha }} || true
          aws ecr batch-delete-image \
            --repository-name transinia-prod-frontend \
            --image-ids imageTag=latest imageTag=${{ github.sha }} || true

      - name: Delete CloudWatch Log Groups
        run: |
          aws logs delete-log-group --log-group-name "/ecs/transinia-prod-backend" || true
          aws logs delete-log-group --log-group-name "/ecs/transinia-prod-frontend" || true
          aws logs delete-log-group --log-group-name "/ecs/transinia-prod-grafana" || true

      - name: Cleanup Summary
        run: |
          echo "⚠️ Deployment failed - automatic cleanup completed"
          echo "Destroyed resources:"
          echo "  ✓ Grafana infrastructure"
          echo "  ✓ DynamoDB tables (⚠️ DATA LOSS)"
          echo "  ✓ S3 buckets (⚠️ DATA LOSS)"
          echo "  ✓ ECR images"
          echo "  ✓ CloudWatch log groups"
          echo ""
          echo "Note: ECS infrastructure (VPC, ALB, Cluster) must be destroyed manually if needed."
